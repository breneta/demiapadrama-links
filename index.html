<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@demiapadrama — Link Produk</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Serif+KR:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fdf6f0;
    --card: #fff;
    --border: #f0e4d8;
    --ink: #1a1410;
    --muted: #a89080;
    --pink: #e8607a;
    --pink2: #f4a0b0;
    --peach: #f5c4a0;
    --sage: #8bbfa0;
    --lav: #c4b0e8;
    --soft: #fdf0e8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Gowun Dodum', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(232,96,122,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(196,176,232,0.07) 0%, transparent 50%);
  }

  .wrap { max-width: 520px; margin: 0 auto; padding: 0 16px 60px; }

  /* HEADER */
  header {
    text-align: center;
    padding: 48px 0 28px;
  }

  .avatar {
    width: 76px;
    height: 76px;
    background: linear-gradient(135deg, var(--pink), var(--lav));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 14px;
    box-shadow: 0 4px 20px rgba(232,96,122,0.25);
    animation: pop 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }

  @keyframes pop {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .handle {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--pink);
    letter-spacing: 1px;
    margin-bottom: 4px;
    opacity: 0;
    animation: up 0.4s ease forwards 0.3s;
  }

  .tagline {
    font-size: 13px;
    color: var(--muted);
    opacity: 0;
    animation: up 0.4s ease forwards 0.5s;
    line-height: 1.6;
  }

  /* SEARCH */
  .search-wrap {
    position: relative;
    margin: 24px 0 8px;
    opacity: 0;
    animation: up 0.4s ease forwards 0.6s;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    pointer-events: none;
  }

  #searchInput {
    width: 100%;
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 13px 14px 13px 42px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  #searchInput:focus {
    border-color: var(--pink);
    box-shadow: 0 0 0 3px rgba(232,96,122,0.1);
  }

  #searchInput::placeholder { color: var(--muted); }

  .result-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
    padding: 6px 4px 10px;
    letter-spacing: 0.5px;
  }

  /* CATEGORIES */
  .cats {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    opacity: 0;
    animation: up 0.4s ease forwards 0.7s;
  }

  .cat {
    font-size: 12px;
    padding: 5px 13px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.3px;
  }

  .cat.active, .cat:hover {
    background: var(--pink);
    border-color: var(--pink);
    color: white;
  }

  /* PRODUCT GRID */
  #productGrid {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .product-card {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    color: inherit;
    transition: all 0.2s;
    cursor: pointer;
    opacity: 0;
    animation: up 0.35s ease forwards;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
  }

  .product-card:hover {
    border-color: var(--pink);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(232,96,122,0.12);
  }

  .product-card.hidden { display: none; }

  .prod-emoji {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .prod-info { flex: 1; min-width: 0; }

  .prod-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 3px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .prod-desc {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-clamp: 2;
    overflow: hidden;
  }

  .prod-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
    flex-wrap: wrap;
  }

  .prod-price {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--pink);
    font-weight: 500;
  }

  .prod-tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 4px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.3px;
  }

  .prod-arrow {
    font-size: 18px;
    color: var(--border);
    flex-shrink: 0;
    transition: color 0.2s, transform 0.2s;
  }

  .product-card:hover .prod-arrow {
    color: var(--pink);
    transform: translateX(3px);
  }

  /* EMPTY STATE */
  #emptyState {
    display: none;
    text-align: center;
    padding: 48px 20px;
    color: var(--muted);
  }

  #emptyState .empty-icon { font-size: 40px; margin-bottom: 12px; }
  #emptyState p { font-size: 14px; line-height: 1.6; }

  /* FOOTER */
  footer {
    text-align: center;
    padding: 32px 0 0;
    font-size: 12px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.5px;
  }

  footer a { color: var(--pink); text-decoration: none; }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: none;
    align-items: flex-end;
    justify-content: center;
    padding: 0 0 0 0;
  }

  .modal-overlay.open { display: flex; animation: fadeIn 0.2s ease; }

  .modal {
    background: var(--card);
    border-radius: 24px 24px 0 0;
    padding: 24px 24px 40px;
    width: 100%;
    max-width: 520px;
    animation: slideUp 0.3s cubic-bezier(0.34,1.1,0.64,1);
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .modal-handle {
    width: 36px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 20px;
  }

  .modal-emoji { font-size: 36px; margin-bottom: 10px; }
  .modal-name { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .modal-desc { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }

  .modal-price {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    color: var(--pink);
    font-weight: 500;
    margin-bottom: 20px;
  }

  .btn-buy {
    display: block;
    width: 100%;
    background: var(--pink);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 15px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-align: center;
    text-decoration: none;
    transition: all 0.2s;
    margin-bottom: 10px;
  }

  .btn-buy:hover { background: #d04060; transform: translateY(-1px); }

  .btn-close {
    display: block;
    width: 100%;
    background: transparent;
    color: var(--muted);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    padding: 13px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-close:hover { border-color: var(--pink); color: var(--pink); }

  @keyframes up {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

  { id:8, emoji:'🎀', name:'Hair Clip Set', desc:'Set hairclip yang sering muncul di drama romance. 6 pcs, bisa mix and match.', price:'Rp 18.000', cat:'aksesoris', tags:['hairclip','jepit rambut','aksesoris','rambut','korea'], color:'#fff3e0', link:'https://shopee.co.id' },
  { id:9, emoji:'👜', name:'Mini Tote Bag Canvas', desc:'Tas simple buat hari-hari kerja. Cukup buat laptop kecil + bekal + drama yang kamu overthink.', price:'Rp 65.000', cat:'aksesoris', tags:['tas','tote bag','canvas','kantor','kasual'], color:'#e3f2fd', link:'https://shopee.co.id' },

  // SNACK KOREA
  { id:10, emoji:'🍫', name:'Choco Pie Original', desc:'Teman setia nonton maraton. Kalau dramanya sad ending, ini yang menyelamatkan.', price:'Rp 25.000', cat:'snack', tags:['choco pie','snack','coklat','korea','cemilan'], color:'#fff8e1', link:'https://shopee.co.id' },
  { id:11, emoji:'🌊', name:'Nori Snack Crispy', desc:'Cemilan sehat yang sering muncul di drama Korea. Renyah, tidak bikin berat, cocok nonton sambil rebahan.', price:'Rp 15.000', cat:'snack', tags:['nori','rumput laut','snack','sehat','korea'], color:'#e8f5e9', link:'https://shopee.co.id' },

  { id:13, emoji:'☕', name:'Dalgona Coffee Kit', desc:'Buat kopi ala drama Korea di rumah. Viral dari dulu, enak dari dulu.', price:'Rp 28.000', cat:'snack', tags:['dalgona','kopi','coffee','korea','minuman'], color:'#efebe9', link:'https://shopee.co.id' },

  // SETUP NONTON

  { id:15, emoji:'🎧', name:'Earphone TWS Murah', desc:'Buat nonton drama pakai hp sambil pura-pura kerja. Suara jernih, baterai tahan lama.', price:'Rp 120.000', cat:'nonton', tags:['earphone','tws','bluetooth','headset','audio'], color:'#e3f2fd', link:'https://shopee.co.id' },

  // FASHION

  { id:20, emoji:'🧣', name:'Muffler Knit Korea', desc:'Scarf rajut yang sering muncul di drama winter. Indonesia tidak punya winter tapi vibesnya ada.', price:'Rp 75.000', cat:'fashion', tags:['scarf','muffler','rajut','korea','winter','fashion'], color:'#f3e5f5', link:'https://shopee.co.id' },
];

let currentCat = 'semua';
let currentSearch = '';
let selectedProduct = null;

function renderProducts() {
  const grid = document.getElementById('productGrid');
  const empty = document.getElementById('emptyState');
  const countEl = document.getElementById('resultCount');

  const filtered = products.filter(p => {
    const matchCat = currentCat === 'semua' || p.cat === currentCat;
    const q = currentSearch.toLowerCase().trim();
    const matchSearch = !q || p.name.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      p.tags.some(t => t.includes(q));
    return matchCat && matchSearch;
  });

  grid.innerHTML = '';

  if (filtered.length === 0) {
    empty.style.display = 'block';
    countEl.textContent = '';
  } else {
    empty.style.display = 'none';
    countEl.textContent = currentSearch ? `${filtered.length} produk ditemukan` : '';

    filtered.forEach((p, i) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.style.animationDelay = `${i * 0.05}s`;
      card.innerHTML = `
        <div class="prod-emoji" style="background:${p.color}">${p.emoji}</div>
        <div class="prod-info">
          <div class="prod-name">${p.name}</div>
          <div class="prod-desc">${p.desc}</div>
          <div class="prod-meta">
            <span class="prod-price">${p.price}</span>
            <span class="prod-tag" style="background:${p.color};color:#666">${p.cat}</span>
          </div>
        </div>
        <div class="prod-arrow">›</div>
      `;
      card.onclick = () => openModal(p);
      grid.appendChild(card);
    });
  }
}

function filterProducts() {
  currentSearch = document.getElementById('searchInput').value;
  renderProducts();
}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.cat').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderProducts();
}

function openModal(p) {
  selectedProduct = p;
  document.getElementById('mEmoji').textContent = p.emoji;
  document.getElementById('mName').textContent = p.name;
  document.getElementById('mDesc').textContent = p.desc;
  document.getElementById('mPrice').textContent = p.price;
  document.getElementById('mBtn').href = p.link;
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

renderProducts();
</script>
</body>
</html>
